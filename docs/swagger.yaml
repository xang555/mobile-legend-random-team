basePath: /api/v1
definitions:
  handlers.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  health.Check:
    properties:
      details:
        additionalProperties: true
        type: object
      error:
        type: string
      name:
        type: string
      status:
        type: string
    type: object
  health.Metadata:
    properties:
      requestCount:
        type: integer
      startedAt:
        type: string
      uptime:
        type: string
    type: object
  health.Response:
    properties:
      checks:
        items:
          $ref: '#/definitions/health.Check'
        type: array
      metadata:
        $ref: '#/definitions/health.Metadata'
      status:
        type: string
      timestamp:
        type: string
      version:
        type: string
    type: object
  random.Member:
    properties:
      hero:
        type: string
      role:
        type: string
    type: object
  random.Team:
    properties:
      members:
        items:
          $ref: '#/definitions/random.Member'
        type: array
    type: object
info:
  contact: {}
  description: API for generating random machine learning teams
  title: Random ML Team API
  version: "1.0"
paths:
  /health:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/health.Response'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/health.Response'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/health.Response'
      summary: Detailed health status
      tags:
      - health
  /health/live:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/health.Response'
      summary: Liveness probe
      tags:
      - health
  /health/ready:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/health.Response'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/health.Response'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/health.Response'
      summary: Readiness probe
      tags:
      - health
  /health/status:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/health.Response'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/health.Response'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/health.Response'
      summary: Detailed health status
      tags:
      - health
  /healthz:
    get:
      produces:
      - text/plain
      responses:
        "200":
          description: ok
          schema:
            type: string
      summary: Legacy health probe
      tags:
      - health
  /team/random:
    get:
      description: Returns a randomly generated team based on configuration
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/random.Team'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Generate random team
      tags:
      - team
swagger: "2.0"
